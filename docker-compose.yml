version: '3.8'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py create_superuser_if_needed && gunicorn Portfolio.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
    depends_on:
      - db

  db:
    image: sqlite3
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
